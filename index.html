<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>bunjee_dick</title>
    <style>
        * { touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { background: #131115; margin: 0; overflow: hidden; }
        #c1 { background: #fbf7fe; position: fixed; left: 0; top: 0; }
        #btn { position: fixed; left: 0; top: 0; z-index: 10; }
        #main { transform-origin: 0 0; position: fixed; left: 0; top: 0; }
        #config { position: fixed; left: 0; top: 30px; display: none; z-index: 10; }
    </style>
</head>
<body>
<div id="main">
    <canvas id="c1" width="1024" height="1024"></canvas>
</div>
<button id="btn">CONFIG</button>
<div id="config">
    <textarea id="kernel" cols="30" rows="10"></textarea><br>
    <button id="apply">APPLY</button>
    <button id="cancle">CANCLE</button>
</div>
<script>
    var cx, cy;
    var glposition, glright, glforward, glup, glorigin, glx, gly, gllen;
    var canvas, gl;
    var date = new Date();
    var t1 = date.getTime();
    var mx = 0, my = 0, mx1 = 0, my1 = 0, lasttimen = 0;
    var ml = 0, mr = 0, mm = 0;
    var len = 1.6;
    var ang1 = 2.8;
    var ang2 = 0.4;
    var cenx = 0.0, ceny = 0.0, cenz = 0.0;

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // KERNEL: Burning Ship × Mandelbulb hybrid ×14
    // abs() fold causes flame/claw asymmetric chaos
    // 10 iterations for maximum depth detail
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    var KERNEL =
        "float kernal(vec3 ver){\n" +
        "   vec3 a;\n" +
        "   float b,c,d;\n" +
        "   a=ver;\n" +
        "   for(int i=0;i<10;i++){\n" +
        "       a=abs(a);\n" +                    // Burning Ship fold — breaks symmetry wildly
        "       b=length(a);\n" +
        "       if(b<0.001) break;\n" +
        "       c=atan(a.y,a.x)*14.0;\n" +        // power 14 angular frequency
        "       d=acos(a.z/b)*14.0;\n" +
        "       b=pow(b,14.0);\n" +               // power 14 — hyper-spiky geometry
        "       a=vec3(b*sin(d)*cos(c),b*sin(d)*sin(c),b*cos(d))+ver;\n" +
        "       if(b>12.0){ break; }\n" +
        "   }\n" +
        "   return 7.0-a.x*a.x-a.y*a.y-a.z*a.z;\n" +
        "}";

    var vertshader, fragshader, shaderProgram;

    function ontimer() {
        ang1 += 0.03;
        draw();
        window.requestAnimationFrame(ontimer);
    }

    // ── Mouse events ──
    document.addEventListener("mousedown", function(ev) {
        if (ev.button == 0) { ml = 1; mm = 0; }
        if (ev.button == 2) { mr = 1; mm = 0; }
        mx = ev.clientX; my = ev.clientY;
    }, false);

    document.addEventListener("mouseup", function(ev) {
        if (ev.button == 0) ml = 0;
        if (ev.button == 2) mr = 0;
    }, false);

    document.addEventListener("mousemove", function(ev) {
        if (ml == 1) {
            ang1 += (ev.clientX - mx) * 0.002;
            ang2 += (ev.clientY - my) * 0.002;
            if (ev.clientX != mx || ev.clientY != my) mm = 1;
        }
        if (mr == 1) {
            var l = len * 4.0 / (cx + cy);
            cenx += l * (-(ev.clientX - mx) * Math.sin(ang1) - (ev.clientY - my) * Math.sin(ang2) * Math.cos(ang1));
            ceny += l * ((ev.clientY - my) * Math.cos(ang2));
            cenz += l * ((ev.clientX - mx) * Math.cos(ang1) - (ev.clientY - my) * Math.sin(ang2) * Math.sin(ang1));
            if (ev.clientX != mx || ev.clientY != my) mm = 1;
        }
        mx = ev.clientX; my = ev.clientY;
    }, false);

    document.addEventListener("wheel", function(ev) {
        ev.preventDefault();
        len *= Math.exp(ev.deltaY * 0.001);
    }, { passive: false });

    document.addEventListener("mousewheel", function(ev) {
        ev.preventDefault();
        len *= Math.exp(-0.001 * ev.wheelDelta);
    }, false);

    // ── Touch events (mobile) ──
    document.addEventListener("touchstart", function(ev) {
        ev.preventDefault();
        var n = ev.touches.length;
        if (n >= 1) { mx = ev.touches[0].clientX; my = ev.touches[0].clientY; }
        if (n >= 2) { mx1 = ev.touches[1].clientX; my1 = ev.touches[1].clientY; }
        lasttimen = n;
    }, { passive: false });

    document.addEventListener("touchend", function(ev) {
        ev.preventDefault();
        var n = ev.touches.length;
        if (n >= 1) { mx = ev.touches[0].clientX; my = ev.touches[0].clientY; }
        if (n >= 2) { mx1 = ev.touches[1].clientX; my1 = ev.touches[1].clientY; }
        lasttimen = n;
    }, { passive: false });

    document.addEventListener("touchmove", function(ev) {
        ev.preventDefault();
        var n = ev.touches.length;
        if (n == 1 && lasttimen == 1) {
            ang1 += (ev.touches[0].clientX - mx) * 0.002;
            ang2 += (ev.touches[0].clientY - my) * 0.002;
            mx = ev.touches[0].clientX; my = ev.touches[0].clientY;
        } else if (n == 2) {
            var ox = ev.touches[0].clientX, oy = ev.touches[0].clientY;
            var ox1 = ev.touches[1].clientX, oy1 = ev.touches[1].clientY;
            var l = len * 2.0 / (cx + cy);
            cenx += l * (-(ox+ox1-mx-mx1)*Math.sin(ang1) - (oy+oy1-my-my1)*Math.sin(ang2)*Math.cos(ang1));
            ceny += l * ((oy+oy1-my-my1)*Math.cos(ang2));
            cenz += l * ((ox+ox1-mx-mx1)*Math.cos(ang1) - (oy+oy1-my-my1)*Math.sin(ang2)*Math.sin(ang1));
            var l1 = Math.sqrt((mx-mx1)*(mx-mx1)+(my-my1)*(my-my1)+1.0);
            mx=ox; my=oy; mx1=ox1; my1=oy1;
            var l2 = Math.sqrt((mx-mx1)*(mx-mx1)+(my-my1)*(my-my1)+1.0);
            len *= l1 / l2;
        }
        lasttimen = n;
    }, { passive: false });

    document.oncontextmenu = function(ev) { if (mm == 1) ev.preventDefault(); };

    function draw() {
        gl.uniform1f(glx, cx * 2.0 / (cx + cy));
        gl.uniform1f(gly, cy * 2.0 / (cx + cy));
        gl.uniform1f(gllen, len);
        gl.uniform3f(glorigin,
            len*Math.cos(ang1)*Math.cos(ang2)+cenx,
            len*Math.sin(ang2)+ceny,
            len*Math.sin(ang1)*Math.cos(ang2)+cenz);
        gl.uniform3f(glright, Math.sin(ang1), 0, -Math.cos(ang1));
        gl.uniform3f(glup, -Math.sin(ang2)*Math.cos(ang1), Math.cos(ang2), -Math.sin(ang2)*Math.sin(ang1));
        gl.uniform3f(glforward, -Math.cos(ang1)*Math.cos(ang2), -Math.sin(ang2), -Math.sin(ang1)*Math.cos(ang2));
        gl.drawArrays(gl.TRIANGLES, 0, 6);
        gl.finish();
    }

    function resize() {
        cx = document.body.clientWidth;
        cy = document.body.clientHeight;
        if (cx > cy) cx = cy; else cy = cx;
        document.getElementById("main").style.width  = "1024px";
        document.getElementById("main").style.height = "1024px";
        document.getElementById("main").style.transform = "scale("+cx/1024+","+cy/1024+")";
    }

    window.onresize = resize;

    window.onload = function() {
        resize();
        var positions = [-1,-1,0, 1,-1,0, 1,1,0, -1,-1,0, 1,1,0, -1,1,0];

        var VSHADER_SOURCE =
            "#version 100\n" +
            "precision highp float;\n" +
            "attribute vec4 position;" +
            "varying vec3 dir,localdir;" +
            "uniform vec3 right,forward,up,origin;" +
            "uniform float x,y;" +
            "void main(){" +
            "  gl_Position=position;" +
            "  dir=forward+right*position.x*x+up*position.y*y;" +
            "  localdir.x=position.x*x;" +
            "  localdir.y=position.y*y;" +
            "  localdir.z=-1.0;" +
            "}";

        var FSHADER_SOURCE =
            "#version 100\n" +
            "#define PI 3.14159265358979324\n" +
            "#define M_L 0.3819660113\n" +
            "#define M_R 0.6180339887\n" +
            "#define MAXR 8\n" +
            "#define SOLVER 8\n" +
            "precision highp float;\n" +
            "float kernal(vec3 ver);\n" +
            "uniform vec3 right,forward,up,origin;\n" +
            "varying vec3 dir,localdir;\n" +
            "uniform float len;\n" +
            "vec3 ver;\n" +
            "int sign;\n" +
            "float v,v1,v2;\n" +
            "float r1,r2,r3,r4,m1,m2,m3,m4;\n" +
            "vec3 n,reflect;\n" +
            "const float step=0.002;\n" +
            "vec3 color;\n" +
            "void main(){\n" +
            "  color=vec3(0.0);\n" +
            "  sign=0;\n" +
            "  v1=kernal(origin+dir*(step*len));\n" +
            "  v2=kernal(origin);\n" +
            "  for(int k=2;k<1002;k++){\n" +
            "    ver=origin+dir*(step*len*float(k));\n" +
            "    v=kernal(ver);\n" +
            "    if(v>0.0&&v1<0.0){\n" +
            "      r1=step*len*float(k-1);\n" +
            "      r2=step*len*float(k);\n" +
            "      m1=kernal(origin+dir*r1);\n" +
            "      m2=kernal(origin+dir*r2);\n" +
            "      for(int l=0;l<SOLVER;l++){\n" +
            "        r3=r1*0.5+r2*0.5;\n" +
            "        m3=kernal(origin+dir*r3);\n" +
            "        if(m3>0.0){r2=r3;m2=m3;}else{r1=r3;m1=m3;}\n" +
            "      }\n" +
            "      if(r3<2.0*len){sign=1;break;}\n" +
            "    }\n" +
            "    if(v<v1&&v1>v2&&v1<0.0&&(v1*2.0>v||v1*2.0>v2)){\n" +
            "      r1=step*len*float(k-2);\n" +
            "      r2=step*len*(float(k)-2.0+2.0*M_L);\n" +
            "      r3=step*len*(float(k)-2.0+2.0*M_R);\n" +
            "      r4=step*len*float(k);\n" +
            "      m2=kernal(origin+dir*r2);\n" +
            "      m3=kernal(origin+dir*r3);\n" +
            "      for(int l=0;l<MAXR;l++){\n" +
            "        if(m2>m3){r4=r3;r3=r2;r2=r4*M_L+r1*M_R;m3=m2;m2=kernal(origin+dir*r2);}\n" +
            "        else{r1=r2;r2=r3;r3=r4*M_R+r1*M_L;m2=m3;m3=kernal(origin+dir*r3);}\n" +
            "      }\n" +
            "      if(m2>0.0){\n" +
            "        r1=step*len*float(k-2);r2=r2;\n" +
            "        m1=kernal(origin+dir*r1);m2=kernal(origin+dir*r2);\n" +
            "        for(int l=0;l<SOLVER;l++){\n" +
            "          r3=r1*0.5+r2*0.5;m3=kernal(origin+dir*r3);\n" +
            "          if(m3>0.0){r2=r3;m2=m3;}else{r1=r3;m1=m3;}\n" +
            "        }\n" +
            "        if(r3<2.0*len&&r3>step*len){sign=1;break;}\n" +
            "      }else if(m3>0.0){\n" +
            "        r1=step*len*float(k-2);r2=r3;\n" +
            "        m1=kernal(origin+dir*r1);m2=kernal(origin+dir*r2);\n" +
            "        for(int l=0;l<SOLVER;l++){\n" +
            "          r3=r1*0.5+r2*0.5;m3=kernal(origin+dir*r3);\n" +
            "          if(m3>0.0){r2=r3;m2=m3;}else{r1=r3;m1=m3;}\n" +
            "        }\n" +
            "        if(r3<2.0*len&&r3>step*len){sign=1;break;}\n" +
            "      }\n" +
            "    }\n" +
            "    v2=v1;v1=v;\n" +
            "  }\n" +
            "  if(sign==1){\n" +
            "    ver=origin+dir*r3;\n" +
            "    r1=ver.x*ver.x+ver.y*ver.y+ver.z*ver.z;\n" +
            "    n.x=kernal(ver-right*(r3*0.00025))-kernal(ver+right*(r3*0.00025));\n" +
            "    n.y=kernal(ver-up*(r3*0.00025))-kernal(ver+up*(r3*0.00025));\n" +
            "    n.z=kernal(ver+forward*(r3*0.00025))-kernal(ver-forward*(r3*0.00025));\n" +
            "    r3=n.x*n.x+n.y*n.y+n.z*n.z;\n" +
            "    n=n*(1.0/sqrt(r3));\n" +
            "    ver=localdir;\n" +
            "    r3=ver.x*ver.x+ver.y*ver.y+ver.z*ver.z;\n" +
            "    ver=ver*(1.0/sqrt(r3));\n" +
            "    reflect=n*(-2.0*dot(ver,n))+ver;\n" +
            "    r3=reflect.x*0.276+reflect.y*0.920+reflect.z*0.276;\n" +
            "    r4=n.x*0.276+n.y*0.920+n.z*0.276;\n" +
            "    r3=max(0.0,r3);\n" +
            "    r3=r3*r3*r3*r3;\n" +
            "    r3=r3*0.45+r4*0.25+0.3;\n" +
            // ── original color palette: sin(r1*10) RGB triplet ──
            "    n.x=sin(r1*10.0)*0.5+0.5;\n" +
            "    n.y=sin(r1*10.0+2.05)*0.5+0.5;\n" +
            "    n.z=sin(r1*10.0-2.05)*0.5+0.5;\n" +
            "    color=n*r3;\n" +
            "  }\n" +
            "  gl_FragColor=vec4(color.x,color.y,color.z,1.0);\n" +
            "}";

        canvas = document.getElementById('c1');
        gl = canvas.getContext('webgl');
        vertshader    = gl.createShader(gl.VERTEX_SHADER);
        fragshader    = gl.createShader(gl.FRAGMENT_SHADER);
        shaderProgram = gl.createProgram();

        gl.shaderSource(vertshader, VSHADER_SOURCE);
        gl.compileShader(vertshader);
        var infov = gl.getShaderInfoLog(vertshader);

        gl.shaderSource(fragshader, FSHADER_SOURCE + KERNEL);
        gl.compileShader(fragshader);
        var infof = gl.getShaderInfoLog(fragshader);

        gl.attachShader(shaderProgram, vertshader);
        gl.attachShader(shaderProgram, fragshader);
        gl.linkProgram(shaderProgram);
        gl.useProgram(shaderProgram);

        if (!gl.getProgramParameter(shaderProgram, gl.LINK_STATUS)) {
            throw 'WebGL compile error:\n' + infov + infof + gl.getProgramInfoLog(shaderProgram);
        }

        glposition = gl.getAttribLocation(shaderProgram,  'position');
        glright    = gl.getUniformLocation(shaderProgram, 'right');
        glforward  = gl.getUniformLocation(shaderProgram, 'forward');
        glup       = gl.getUniformLocation(shaderProgram, 'up');
        glorigin   = gl.getUniformLocation(shaderProgram, 'origin');
        glx        = gl.getUniformLocation(shaderProgram, 'x');
        gly        = gl.getUniformLocation(shaderProgram, 'y');
        gllen      = gl.getUniformLocation(shaderProgram, 'len');

        var buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.STATIC_DRAW);
        gl.vertexAttribPointer(glposition, 3, gl.FLOAT, false, 0, 0);
        gl.enableVertexAttribArray(glposition);
        gl.viewport(0, 0, 1024, 1024);

        draw();
        window.requestAnimationFrame(ontimer);
        document.getElementById("kernel").value = KERNEL;

        document.getElementById("btn").addEventListener("click", function() {
            var s = this.innerText == "CONFIG";
            this.innerText = s ? "HIDE" : "CONFIG";
            document.getElementById("config").style.display = s ? "inline" : "none";
        });

        document.getElementById("apply").addEventListener("click", function() {
            KERNEL = document.getElementById("kernel").value;
            gl.shaderSource(fragshader, FSHADER_SOURCE + KERNEL);
            gl.compileShader(fragshader);
            var infof = gl.getShaderInfoLog(fragshader);
            gl.linkProgram(shaderProgram);
            gl.useProgram(shaderProgram);
            if (!gl.getProgramParameter(shaderProgram, gl.LINK_STATUS)) {
                alert(infof + gl.getProgramInfoLog(shaderProgram));
            }
            glposition = gl.getAttribLocation(shaderProgram,  'position');
            glright    = gl.getUniformLocation(shaderProgram, 'right');
            glforward  = gl.getUniformLocation(shaderProgram, 'forward');
            glup       = gl.getUniformLocation(shaderProgram, 'up');
            glorigin   = gl.getUniformLocation(shaderProgram, 'origin');
            glx        = gl.getUniformLocation(shaderProgram, 'x');
            gly        = gl.getUniformLocation(shaderProgram, 'y');
            gllen      = gl.getUniformLocation(shaderProgram, 'len');
        });

        document.getElementById("cancle").addEventListener("click", function() {
            document.getElementById("kernel").value = KERNEL;
        });
    };
</script>
</body>
</html>
